<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Davide Malaguti – CV</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
    }

    header {
      width: 100%;
      max-width: 860px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #111;
    }

    h1 span { color: #555; font-weight: 400; }

    .contacts {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .contacts a {
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 7px 13px;
      transition: border-color 0.2s, color 0.2s, box-shadow 0.2s;
    }

    .contacts a:hover {
      border-color: #111;
      color: #111;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .contacts a svg {
      width: 14px; height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    .pdf-container {
      width: 100%;
      max-width: 860px;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    embed {
      display: block;
      width: 100%;
      height: 90vh;
      min-height: 600px;
      border: none;
    }

    .fallback {
      padding: 40px;
      text-align: center;
      font-size: 14px;
      color: #666;
    }

    .fallback a {
      color: #111;
      font-weight: 600;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <header>
    <h1>Malaguti Davide <span>/ CV</span></h1>
    <div class="contacts">
      <a href="tel:+393335621520">

        +39 333 562 1520
      </a>
      <a href="mailto:davide.malaguti03@gmail.com">
        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        davide.malaguti03@gmail.com
      </a>
    </div>
  </header>

  <div class="pdf-container">
    <embed src="CV_2k26.pdf" type="application/pdf">
    <div class="fallback">
      PDF preview not available in your browser. <a href="CV_2k26.pdf" download>Download CV</a>
    </div>
  </div>

</body>
</html>
